server:
  port: 8081

spring:
  application:
    name: event-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ticket_db
    username: postgres
    password: Nymari21062004.
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 600000 # 10 phút (tính bằng mili-giây hoặc tùy phiên bản Spring Boot tự động nhận)
      cache-null-values: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
